{% extends "base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Edit User</h2>

        <a href="{{ url_for('users.view_users') }}" class="btn btn-secondary">
            ← Back
        </a>

    </div>

    <hr>

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Employee ID</label>
                <input type="text"
                       name="employee_id"
                       class="form-control"
                       value="{{ user.employee_id }}"
                       required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{ user.name }}"
                       required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       value="{{ user.email }}"
                       required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">
                    New Password (Leave blank to keep existing)
                </label>
                <input type="password"
                       name="password"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Department</label>
                <input type="text"
                       name="department"
                       class="form-control"
                       value="{{ user.department }}">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Mobile</label>
                <input type="text"
                       name="mobile"
                       class="form-control"
                       value="{{ user.mobile }}">
            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">Role</label>

                <select name="role" class="form-select">

                    <option value="Employee"
                        {% if user.role == "Employee" %}selected{% endif %}>
                        Employee
                    </option>
<option value="Technician"
    {% if user.role == "Technician" %}selected{% endif %}>
    Technician
</option>
                    <option value="Admin"
                        {% if user.role == "Admin" %}selected{% endif %}>
                        Admin
                    </option>

                </select>

            </div>

        </div>

        <button type="submit" class="btn btn-primary">
            💾 Update User
        </button>

        <a href="{{ url_for('users.view_users') }}"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
