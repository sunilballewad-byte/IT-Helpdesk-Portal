{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2>User List</h2>

    <hr>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Role</th>
            </tr>
        </thead>

        <tbody>

        {% for user in users %}

        <tr>

            <td>{{ user.id }}</td>
            <td>{{ user.employee_id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.department }}</td>
            <td>{{ user.role }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
