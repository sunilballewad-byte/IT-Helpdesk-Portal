{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>All Tickets</h2>

<hr>

<table class="table table-bordered">

<tr>
<th>Ticket</th>
<th>Title</th>
<th>Status</th>
<th>Priority</th>
</tr>

{% for ticket in tickets %}

<tr>

<td>{{ ticket.ticket_number }}</td>

<td>{{ ticket.title }}</td>

<td>{{ ticket.status }}</td>

<td>{{ ticket.priority }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
